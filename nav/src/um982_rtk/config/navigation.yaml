# UM982 RTK pure-pursuit navigation configuration.

topics:
  odom: "/odometry/rtk"
  task: "/task"
  cmd_vel: "/cmd_vel"
  fix_quality: "/rtk/fix_quality"
  state: "/navigation/state"
  active_path: "/um982_rtk/active_path"
  status: "/um982_rtk/navigation_status"
  localization_mode: ""

control:
  frequency: 20.0
  odom_timeout: 1.0
  require_rtk_fixed: true
  require_localization_ok: false
  localization_grace_period_sec: 10.0
  fixed_quality_value: 4

tracking:
  lookahead_distance: 1.0
  waypoint_tolerance: 0.5
  goal_tolerance: 0.35
  max_linear_speed: 0.5
  max_angular_speed: 0.6
  min_linear_speed: 0.06
  slowdown_distance: 1.8
  rotate_in_place_threshold: 0.85
  yaw_align_speed: 0.35
  turn_slowdown_angular: 0.45
  allow_reverse: false

smoothing:
  enabled: true
  linear_acceleration: 0.25
  angular_acceleration: 0.45

goal:
  enforce_goal_yaw: false
  default_yaw_tolerance: 0.15
