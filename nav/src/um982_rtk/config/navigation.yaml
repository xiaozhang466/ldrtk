# UM982 RTK pure-pursuit navigation configuration.

topics:
  odom: "/odometry/rtk"
  task: "/task"
  cmd_vel: "/cmd_vel"
  fix_quality: "/rtk/fix_quality"
  state: "/navigation/state"
  active_path: "/um982_rtk/active_path"
  status: "/um982_rtk/navigation_status"

control:
  frequency: 20.0
  odom_timeout: 1.0
  require_rtk_fixed: true
  fixed_quality_value: 4

tracking:
  lookahead_distance: 0.8
  waypoint_tolerance: 0.5
  goal_tolerance: 0.35
  max_linear_speed: 0.2
  max_angular_speed: 0.35
  min_linear_speed: 0.04
  slowdown_distance: 1.2
  rotate_in_place_threshold: 0.85
  yaw_align_speed: 0.25
  turn_slowdown_angular: 0.25
  allow_reverse: false

smoothing:
  enabled: true
  linear_acceleration: 0.12
  angular_acceleration: 0.25

goal:
  enforce_goal_yaw: false
  default_yaw_tolerance: 0.15
