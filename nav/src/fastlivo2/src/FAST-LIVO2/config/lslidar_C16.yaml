common:
  img_topic: "/left_camera/image"
  lid_topic: "/lslidar_point_cloud"
  imu_topic: "/IMU_data"
  img_en: 0
  lidar_en: 1
  ros_driver_bug_fix: false

extrin_calib:
  extrinsic_T: [0, 0, 0.30]
  extrinsic_R: [1, 0, 0, 0, 1, 0, 0, 0, 1]
  
  # User provided extrinsics
  Rcl: [ -0.056836, -0.998376, -0.003851,
          0.006135,  0.003508, -0.999975,
          0.998365, -0.056858,  0.005925]
  Pcl: [ -0.008042,  0.068650, -0.017779]

time_offset: 
  imu_time_offset: 0.0
  img_time_offset: 0.0
  lidar_time_offset: -0.02   # 补偿雷达传输延迟，负值表示时间戳比实际采集晚
  exposure_time_init: 0.0

preprocess:
  point_filter_num: 1
  filter_size_surf: 0.1
  lidar_type: 2         # VELO16 (as proxy for 16-line Lslidar)
  scan_line: 16
  blind: 0.5            # Adjusted for C16, typically has smaller blind zone than Avia

vio:
  max_iterations: 5
  outlier_threshold: 1000 
  img_point_cov: 100 
  patch_size: 8
  patch_pyrimid_level: 4
  normal_en: true
  raycast_en: false
  inverse_composition_en: false
  exposure_estimate_en: true
  inv_expo_cov: 0.1

imu:
  imu_en: true
  imu_int_frame: 30
  acc_cov: 0.5 
  gyr_cov: 0.3 
  b_acc_cov: 0.0001 
  b_gyr_cov: 0.0001 

lio:
  max_iterations: 5
  dept_err: 0.02
  beam_err: 0.05
  min_eigen_value: 0.0025 
  voxel_size: 0.5
  max_layer: 2
  max_points_num: 50
  layer_init_num: [5, 5, 5, 5, 5]

local_map:  
  map_sliding_en: false
  half_map_size: 100
  sliding_thresh: 8

uav:
  imu_rate_odom: false
  gravity_align_en: true

publish:
  dense_map_en: true
  pub_effect_point_en: false 
  pub_plane_en: false
  pub_scan_num: 1
  blind_rgb_points: 0.0

evo:
  seq_name: "Lslidar_C16_Test"
  pose_output_en: false

pcd_save:
  pcd_save_en: true
  type: 2 
  colmap_output_en: false 
  filter_size_pcd: 0.15
  interval: -1

image_save:
  img_save_en: false
  interval: 1
